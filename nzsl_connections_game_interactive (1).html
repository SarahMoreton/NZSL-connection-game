<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NZSL Learning Platform (Teacher Led)</title>
<style>
body { font-family: Arial; background:#121213; color:white; text-align:center; }
.grid { display:grid; grid-template-columns: repeat(4, 140px); gap:10px; justify-content:center; margin:20px; }
.card { background:#3a3a3c; padding:12px; border-radius:10px; cursor:pointer; }
.selected { background:#565758; }
.correct { background:green; }
.present { background:orange; }
.letter { display:inline-block; width:45px; height:45px; margin:3px; background:#3a3a3c; line-height:45px; }
img.hand { width:40px; height:40px; }
#dashboard { margin-top:20px; }
</style>
</head>
<body>
<h1>NZSL Learning Platform (Teacher Led)</h1>

<select id="mode">
  <option value="connections">Connections</option>
  <option value="wordle">Fingerspelling Wordle</option>
</select>

<div id="game"></div>

<div id="dashboard">
<h3>Class Progress</h3>
<p id="stats"></p>
</div>

<script>
// TEACHER-LED CLASS TRACKING
let stats = JSON.parse(localStorage.getItem("nzslClassStats") || '{"wins":0,"plays":0}');

function updateDashboard(){
  document.getElementById("stats").innerHTML =
    `Total Plays: ${stats.plays} <br> Total Wins: ${stats.wins}`;
  localStorage.setItem("nzslClassStats", JSON.stringify(stats));
}

// CONNECTIONS
const groups = [
{name:"Needs", words:["MONEY","FOOD","DRINK","PHONE"]},
{name:"Emotions", words:["HAPPY","SAD","ANGRY","LOVE"]},
{name:"Learning", words:["READ","WRITE","BOOK","LEARN"]},
{name:"People", words:["MUM","DAD","FRIEND","TEACHER"]}
];

let puzzle=[], selected=[];

function loadConnections(){
  const container=document.getElementById("game");
  container.innerHTML="<h2>Connections</h2><div id='grid' class='grid'></div><button onclick='checkGroup()'>Submit</button><p id='status'></p>";

  puzzle=[];
  selected=[];

  groups.forEach((g,i)=>g.words.forEach(w=>puzzle.push({word:w,group:i})));
  puzzle.sort(()=>Math.random()-0.5);

  const grid=document.getElementById("grid");

  puzzle.forEach(item=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerText=item.word;
    div.onclick=()=>toggle(div,item);
    grid.appendChild(div);
  });
}

function toggle(el,item){
  if(selected.includes(item)){
    selected=selected.filter(i=>i!==item);
    el.classList.remove("selected");
  } else if(selected.length<4){
    selected.push(item);
    el.classList.add("selected");
  }
}

function checkGroup(){
  const status=document.getElementById("status");
  if(selected.length!==4) return;

  const g=selected[0].group;
  const correct=selected.every(i=>i.group===g);

  stats.plays++;

  if(correct){
    status.innerText="Correct";
    stats.wins++;
  } else {
    status.innerText="Try again";
  }

  updateDashboard();
  selected=[];
}

// WORDLE WITH HANDSHAPES
const alphabetImages = letter => `https://dummyimage.com/40x40/ffffff/000000&text=${letter}`;

const words=["LEARN","WRITE","BOOK","PHONE"];
let target="";

function loadWordle(){
  const container=document.getElementById("game");
  container.innerHTML="<h2>Fingerspelling Wordle</h2><input id='guess'><button onclick='guessWord()'>Guess</button><div id='board'></div>";

  target=words[Math.floor(Math.random()*words.length)];
}

function guessWord(){
  const guess=document.getElementById("guess").value.toUpperCase();
  if(guess.length!==target.length) return;

  const row=document.createElement("div");

  guess.split('').forEach((l,i)=>{
    const span=document.createElement("span");
    span.className="letter";

    const img=document.createElement("img");
    img.src=alphabetImages(l);
    img.className="hand";

    if(l===target[i]) span.classList.add("correct");
    else if(target.includes(l)) span.classList.add("present");

    span.appendChild(img);
    row.appendChild(span);
  });

  document.getElementById("board").appendChild(row);

  stats.plays++;

  if(guess===target){
    alert("Correct!");
    stats.wins++;
  }

  updateDashboard();
  document.getElementById("guess").value="";
}

// MODE SWITCH
function loadMode(){
  const mode=document.getElementById("mode").value;
  if(mode==="connections") loadConnections();
  if(mode==="wordle") loadWordle();
}

document.getElementById("mode").onchange=loadMode;

loadMode();
updateDashboard();
</script>
</body>
</html>
